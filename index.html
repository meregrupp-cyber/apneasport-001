<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peagi tulemas</title>

  <style>
    :root {
      --text-base: 5vw;
      --text-max: calc(var(--text-base) * 1.8);
      --loop-time: 10s;
      --spin-time: 60s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
    }

    body {
      min-height: 100vh;
    }

    .coming-soon-page {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
    }

    .rotating-background {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100vw;
      height: 100vw;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      z-index: -1;
      animation: clockwiseSpin var(--spin-time) linear infinite;
      will-change: transform;
    }

    .rotating-background img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .text-stage {
      position: relative;
      width: 100vw;
      height: 40vw;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .animated-text {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100vw;
      transform: translate(-50%, -50%);
      font-size: var(--text-base);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-transform: lowercase;
      text-align: center;
      white-space: nowrap;
      color: #07345f;
      opacity: 0;
      text-shadow:
        0 0.06em 0.16em rgba(255, 255, 255, 0.38),
        0 0 0.04em rgba(255, 255, 255, 0.55);
      animation-duration: var(--loop-time);
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      will-change: font-size, opacity;
    }

    .animated-text--first {
      animation-name: firstTextPulse;
    }

    .animated-text--second {
      animation-name: secondTextPulse;
    }

    @keyframes clockwiseSpin {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes firstTextPulse {
      0% {
        font-size: var(--text-base);
        opacity: 1;
      }
      22.5% {
        font-size: var(--text-max);
        opacity: 1;
      }
      45% {
        font-size: var(--text-base);
        opacity: 1;
      }
      50%,
      100% {
        font-size: var(--text-base);
        opacity: 0;
      }
    }

    @keyframes secondTextPulse {
      0%,
      50% {
        font-size: var(--text-base);
        opacity: 0;
      }
      55% {
        font-size: var(--text-base);
        opacity: 1;
      }
      72.5% {
        font-size: var(--text-max);
        opacity: 1;
      }
      95% {
        font-size: var(--text-base);
        opacity: 1;
      }
      100% {
        font-size: var(--text-base);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rotating-background,
      .animated-text {
        animation: none;
      }

      .animated-text--first {
        opacity: 1;
        font-size: var(--text-base);
      }

      .animated-text--second {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <main class="coming-soon-page" aria-label="Peagi tulemas leht">
    <div class="rotating-background" aria-hidden="true">
      <img src="background.png" alt="" />
    </div>

    <div class="text-stage" aria-live="polite">
      <h1 class="animated-text animated-text--first">peagi tulemas</h1>
      <h2 class="animated-text animated-text--second">eesti apneaspordi liit</h2>
    </div>
  </main>
</body>
</html>
